<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Constance — Daily Office</title>
  <link rel="stylesheet" href="css/style.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Spectral:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400;1,500&family=IBM+Plex+Sans+Condensed:ital,wght@0,300;0,400;0,500;1,300;1,400&display=swap"
    rel="stylesheet"
  />
</head>
<body data-season="ordinary">
  <!-- Season background video -->
  <video id="bg-video" autoplay muted loop playsinline disablepictureinpicture></video>

  <div class="page">

    <!-- Title -->
    <p id="season-label" class="season-label"></p>
    <h1 id="main-title" class="main-title"></h1>

    <!-- Navigation -->
    <nav class="date-nav" aria-label="Day navigation">
      <button id="prev-day" class="nav-btn" aria-label="Previous day">← Previous</button>
      <button id="next-day" class="nav-btn" aria-label="Next day" disabled>Next →</button>
    </nav>


    <!-- Seasonal Note -->
    <div id="seasonal-note" class="seasonal-note" style="display:none;"></div>

    <!-- Dynamic content: Scripture, Liturgy, Prayer -->
    <div id="content">
      <div class="loading-state">
        <div class="loading-spinner"></div>
        <p>Loading today's readings…</p>
      </div>
    </div>

    <!-- Footer -->
    <div class="page-footer">
      <p class="footer-text">Constance Daily Reading</p>
    </div>

  </div>

  <script src="js/calendar.js"></script>
  <script src="js/schedule.js"></script>
  <script src="js/catechism.js"></script>
  <script src="js/prayers.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
