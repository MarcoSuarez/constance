<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Constance — Daily Office</title>
  <link rel="stylesheet" href="css/style.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link
    href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,500;1,400;1,500&family=Cinzel:wght@400;500&family=Cormorant+Upright:wght@300;400;500&display=swap"
    rel="stylesheet"
  />
</head>
<body data-season="ordinary">
  <div class="page">

    <!-- Season + Date -->
    <div class="season-banner">
      <span id="season-label" class="season-label">✦ Daily Office ✦</span>
      <span id="date-line" class="date-line"></span>
    </div>

    <!-- Navigation -->
    <nav class="date-nav" aria-label="Day navigation">
      <button id="prev-day" class="nav-btn" aria-label="Previous day">← Previous</button>
      <button id="next-day" class="nav-btn" aria-label="Next day" disabled>Next →</button>
    </nav>

    <!-- Title -->
    <div class="title-cross">✝</div>
    <h1 class="main-title">Daily Office</h1>
    <p id="subtitle" class="subtitle">A Rule of Prayer for Every Day</p>

    <!-- Seasonal Note -->
    <div id="seasonal-note" class="seasonal-note" style="display:none;"></div>

    <!-- Dynamic content: Scripture, Liturgy, Prayer -->
    <div id="content">
      <div class="loading-state">
        <div class="loading-spinner"></div>
        <p>Loading today's readings…</p>
      </div>
    </div>

    <!-- Footer -->
    <div class="page-footer">
      <p class="footer-text">Soli Deo Gloria &nbsp;✦&nbsp; The Lord's Prayer closes the Office</p>
    </div>

  </div>

  <script src="js/calendar.js"></script>
  <script src="js/schedule.js"></script>
  <script src="js/catechism.js"></script>
  <script src="js/prayers.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
